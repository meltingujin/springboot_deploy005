name: Java & React CI/CD with Docker

# github actions가 동작되는 상태 : main branch에서 push가 발생하면 main.yml workflow를 동작시키겠다.
on:
  push:
    branches: [ "main" ]

jobs:
  # build를 하고 push(docker hub)
  build-and-push:
    # github의 소스를 clone해서 임시서버에 저장을 해서 Maven을 실행해서 jar파일을 만드는 공간 OS가 된다
    runs-on: ubuntu-latest

    # steps 작업의 단계
    # uses 항목 : Maven 동작 다운로드 받고, Node 다운받고, github actions에서는 미리가지고 있다
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 공통 설정 (QEMU, Buildx, Login) ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # SpringBoot(java 21, Maven)
      # --- [BACKEND] Java 빌드 (JAR 생성) ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend (Maven)
        run: mvn clean package -DskipTests -f ./deploy005_springboot_react/pom.xml

      # React JS 빌드(Dist 생성)
      # --- [FRONTEND] React 빌드 (Dist 생성) ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './deploy_front/package-lock.json'

      - name: Build Frontend (NPM)
        run: |
          cd deploy_front
          npm install
          npm run build

      # Docker hub에 각 Build를 기준으로 docker hub repository에 해당 프로젝트의 DockerFile을 통해서 이미지로 빌드 한 후 배포
      # --- [DOCKER PUSH] Backend ---
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./deploy005_springboot_react
          file: ./deploy005_springboot_react/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/deploy005_springboot:latest

      # --- [DOCKER PUSH] Frontend ---
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./deploy_front
          file: ./deploy_front/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/deploy_front:latest

  # Docker hub에 이미지를 push 하고, 운영 서버에 배포
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3

        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port:     ${{ secrets.SERVER_PORT }}

          script: |
            # 1. 네트워크 생성 (이미 있으면 무시)
            docker network create app-network || true

            # 2. 기존 컨테이너 중지 및 삭제
            docker stop springboot_server react_front || true
            docker rm springboot_server react_front || true

            # 3. 최신 이미지 Pull
            docker pull ${{ secrets.DOCKER_USERNAME }}/deploy005_springboot:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/deploy_front:latest

            # 4. 컨테이너 실행
            docker run -d \
              --name springboot_server \
              -p 9090:9090 \
              --network app-network \
              ${{ secrets.DOCKER_USERNAME }}/deploy005_springboot:latest

            docker run -d \
              --name react_front \
              -p 5173:80 \
              --network app-network \
              ${{ secrets.DOCKER_USERNAME }}/deploy_front:latest

            # 5. 미사용 이미지 정리
            docker image prune -f